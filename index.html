<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>한자 플래시카드 준4급</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Noto Sans KR',system-ui,sans-serif;background:#f8f3e8;color:#1a1208;overflow:hidden;position:fixed;width:100%;}
:root{--gold:#9a7b2e;--gold2:#c4a052;--gold3:#e8c870;--red:#c0392b;--green:#2d7a4a;--gray:#8a7a62;--ink:#1a1208;--card:#fffef8;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;overflow-y:auto;transition:opacity .2s;background:#f8f3e8;}
.scr.off{opacity:0;pointer-events:none;}

/* ── TOP BAR ── */
.tb{display:flex;align-items:center;gap:10px;padding:calc(var(--st) + 10px) 14px 8px;background:rgba(248,243,232,.95);border-bottom:1px solid rgba(154,123,46,.12);flex-shrink:0;position:sticky;top:0;z-index:10;}
.tb-back{font-size:22px;color:var(--gold);cursor:pointer;padding:2px 6px;border:none;background:none;line-height:1;}
.tb-info{flex:1;min-width:0;}
.tb-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:11px;color:var(--gray);margin-top:1px;}
.tb-cnt{font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;}
.pbar{height:3px;background:rgba(154,123,46,.1);flex-shrink:0;}
.pfill{height:100%;transition:width .4s;background:linear-gradient(90deg,var(--gold),var(--gold3));}

/* ── HOME ── */
#home{padding:calc(var(--st)+16px) 16px calc(var(--sb)+20px);}
.hcenter{max-width:420px;margin:0 auto;text-align:center;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;font-size:11px;font-weight:700;letter-spacing:1.5px;padding:4px 14px;border-radius:20px;margin-bottom:10px;}
.htitle{font-size:24px;font-weight:800;font-family:serif;margin-bottom:4px;}
.htitle span{color:var(--gold);}
.hsub{font-size:12px;color:var(--gray);margin-bottom:16px;}
.tabs{display:flex;background:#ede5d0;border-radius:12px;padding:3px;margin-bottom:14px;gap:3px;}
.tab{flex:1;padding:8px 4px;border:none;border-radius:9px;background:transparent;font-size:12px;font-weight:600;color:var(--gray);cursor:pointer;line-height:1.3;font-family:inherit;}
.tab.on{background:var(--card);color:var(--gold);font-weight:700;box-shadow:0 2px 8px rgba(100,70,10,.1);}
.panel{display:none;}.panel.on{display:block;}
.lv-list,.sec-list{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
.lv-item{background:var(--card);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:11px;border:1.5px solid rgba(154,123,46,.12);cursor:pointer;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(100,70,10,.07);}
.lv-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),var(--gold2));}
.lv-item:active{transform:scale(.97);}
.lv-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;font-family:serif;flex-shrink:0;}
.lv-name{font-size:13px;font-weight:700;}
.lv-meta{font-size:11px;color:var(--gray);margin-top:1px;}
.lv-prog{font-size:12px;font-weight:800;color:var(--green);}
.lv-prog.none{color:#ccc;}
.sec-item{background:var(--card);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:10px;border:1.5px solid rgba(154,123,46,.1);cursor:pointer;box-shadow:0 2px 7px rgba(100,70,10,.06);}
.sec-item:active{transform:scale(.97);}
.sec-num{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;flex-shrink:0;}
.sec-info{flex:1;}.sec-title{font-size:13px;font-weight:700;}.sec-range{font-size:11px;color:var(--gray);margin-top:1px;}
.sec-score{font-size:12px;font-weight:700;}
.sec-score.good{color:var(--green);}.sec-score.mid{color:var(--gold);}.sec-score.none{color:#ccc;}
.bigbtn{width:100%;padding:14px;border:none;border-radius:14px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit;}
.bigbtn.dark{background:linear-gradient(135deg,#1a1208,#3a2810);color:var(--gold3);box-shadow:0 4px 14px rgba(0,0,0,.22);}
.bigbtn.purple{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3);}
.qz-banner{background:linear-gradient(135deg,#1a1208,#3a2010);border-radius:16px;padding:18px;text-align:center;margin-bottom:12px;}
.qzb-ico{font-size:32px;margin-bottom:6px;}
.qzb-title{font-size:17px;font-weight:800;color:var(--gold3);font-family:serif;margin-bottom:4px;}
.qzb-desc{font-size:11px;color:rgba(255,255,255,.5);line-height:1.5;}
.my-rank{background:var(--card);border-radius:12px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:12px;border:1.5px solid rgba(154,123,46,.14);}
.mr-lbl{font-size:11px;color:var(--gray);}.mr-rank{font-size:14px;font-weight:800;color:var(--gold);flex:1;}.mr-pct{font-size:12px;font-weight:700;color:var(--green);}

/* ── CARD ── */
.card-stage{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px 8px;perspective:1000px;overflow:hidden;}
.card-outer{width:100%;max-width:320px;height:min(390px,calc(100vh - 240px));position:relative;cursor:pointer;}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;}
.card-inner.anim{transition:transform .5s cubic-bezier(.4,0,.2,1);}
.card-inner.flipped{transform:rotateY(180deg);}
.face{position:absolute;inset:0;border-radius:24px;-webkit-backface-visibility:hidden;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;}
.face-front{background:var(--card);border:1.5px solid rgba(154,123,46,.15);box-shadow:0 10px 32px rgba(100,70,10,.15);}
.face-back{background:var(--ink);transform:rotateY(180deg);box-shadow:0 10px 32px rgba(0,0,0,.35);}
.cf-badge{position:absolute;top:13px;left:13px;font-size:10px;font-weight:700;color:var(--gold);background:rgba(154,123,46,.1);padding:2px 8px;border-radius:8px;}
.cf-rad{position:absolute;top:13px;right:13px;font-size:10px;color:var(--gray);background:#ede5d0;padding:2px 8px;border-radius:8px;font-family:serif;}
.cf-k{font-size:clamp(80px,22vw,108px);font-weight:800;font-family:serif;color:var(--ink);line-height:1;text-shadow:2px 3px 0 rgba(154,123,46,.1);margin-bottom:8px;}
.cf-hint{font-size:11px;color:var(--gray);text-align:center;max-width:210px;line-height:1.5;}
.cf-tap{position:absolute;bottom:12px;font-size:10px;color:rgba(154,123,46,.4);}
.cb-k{font-size:40px;font-weight:800;font-family:serif;color:rgba(255,255,255,.12);line-height:1;margin-bottom:12px;}
.cb-read{font-size:26px;font-weight:800;font-family:serif;color:var(--gold3);letter-spacing:2px;margin-bottom:3px;}
.cb-mean{font-size:16px;color:rgba(255,255,255,.6);font-family:serif;margin-bottom:14px;}
.cb-line{width:28px;height:1px;background:rgba(255,255,255,.12);margin:0 auto 12px;}
.cb-rad-row{display:flex;align-items:center;gap:6px;margin-bottom:10px;}
.cb-rl{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.cb-rv{font-size:13px;color:var(--gold2);font-weight:700;font-family:serif;}
.cb-orig{font-size:11px;color:rgba(255,255,255,.48);line-height:1.7;text-align:center;max-width:240px;}
.cb-orig em{color:var(--gold3);font-style:normal;font-weight:600;}
/* 중급 앞면 - 한자 크게 */
.s2-k{font-size:clamp(90px,27vw,130px);font-weight:800;font-family:serif;color:var(--ink);line-height:1;text-shadow:3px 4px 0 rgba(154,123,46,.1);}

/* ── CARD ACTIONS ── */
.ca{display:flex;gap:8px;padding:8px 14px calc(var(--sb)+12px);flex-shrink:0;}
.cabtn{flex:1;padding:13px 7px;border-radius:13px;border:none;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:inherit;}
.cabtn:active{transform:scale(.95);}
.ca-prev{background:rgba(154,123,46,.1);color:var(--gold);flex:0 0 44px;font-size:18px;}
.ca-again{background:rgba(192,57,43,.1);color:var(--red);}
.ca-know{background:rgba(45,122,74,.1);color:var(--green);}
.locked{opacity:.3;pointer-events:none;}

/* ── RESULT ── */
.result-wrap{padding:18px 16px calc(var(--sb)+28px);overflow-y:auto;flex:1;}
.ri{max-width:380px;margin:0 auto;text-align:center;}
.ri-e{font-size:48px;line-height:1;margin-bottom:8px;}
.ri-t{font-size:21px;font-weight:800;font-family:serif;margin-bottom:4px;}
.ri-s{font-size:12px;color:var(--gray);margin-bottom:16px;}
.stats{display:flex;gap:8px;margin-bottom:14px;}
.stat{flex:1;background:var(--card);border-radius:12px;padding:10px 7px;text-align:center;border:1.5px solid rgba(154,123,46,.08);}
.stat-n{font-size:20px;font-weight:900;line-height:1;margin-bottom:2px;}
.stat-l{font-size:10px;color:var(--gray);}
.cg .stat-n{color:var(--green);}.cr .stat-n{color:var(--red);}.cgo .stat-n{color:var(--gold);}.cpu .stat-n{color:#5b21b6;}
.w-sec{text-align:left;margin-bottom:14px;}
.w-ttl{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:1px;margin-bottom:7px;}
.w-chips{display:flex;flex-wrap:wrap;gap:6px;}
.w-chip{background:var(--card);border:1.5px solid rgba(192,57,43,.2);border-radius:11px;padding:7px 10px;text-align:center;}
.wc-k{font-size:17px;font-weight:800;color:var(--red);font-family:serif;}
.wc-m{font-size:10px;color:var(--gray);margin-top:1px;}
.r-btns{display:flex;flex-direction:column;gap:8px;}
.rbtn{padding:13px;border:none;border-radius:13px;width:100%;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.rbtn:disabled{opacity:.35;cursor:default;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#fff;}
.btn-red{background:linear-gradient(135deg,var(--red),#e05050);color:#fff;}
.btn-pu{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;}
.btn-outline{background:var(--card);color:var(--ink);border:1.5px solid rgba(154,123,46,.18);}

/* ── QUIZ ── */
#quiz{overflow:hidden;}
.qpbar{height:4px;background:rgba(79,70,229,.1);flex-shrink:0;}
.qpfill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed);transition:width .4s;}
.sdbar{display:flex;justify-content:center;gap:6px;padding:8px 14px 0;flex-shrink:0;}
.sd{width:8px;height:8px;border-radius:50%;background:rgba(154,123,46,.15);border:1.5px solid rgba(154,123,46,.18);transition:all .3s;}
.sd.lit{background:var(--gold3);border-color:var(--gold);box-shadow:0 0 6px rgba(232,200,112,.55);}
.qq-area{flex-shrink:0;padding:8px 16px 5px;text-align:center;}
.qq-num{font-size:11px;color:var(--gray);margin-bottom:4px;}
.qq-k{font-size:clamp(68px,20vw,96px);font-weight:800;font-family:serif;color:var(--ink);line-height:1;text-shadow:2px 3px 0 rgba(154,123,46,.1);margin-bottom:3px;}
.qq-type{font-size:11px;color:var(--gray);}
.qchoices{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:6px 12px calc(var(--sb)+12px);overflow:hidden;}
.qc{background:var(--card);border:2px solid rgba(154,123,46,.12);border-radius:14px;padding:10px 6px;cursor:pointer;font-weight:700;color:var(--ink);box-shadow:0 2px 8px rgba(100,70,10,.08);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:64px;font-family:serif;}
.qc:active:not(:disabled){transform:scale(.95);}
.qc-main{font-size:15px;}.qc-sub{font-size:10px;color:var(--gray);font-family:system-ui;font-weight:400;}
.qc.correct{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e;}
.qc.correct .qc-main,.qc.correct .qc-sub{color:#15803d;}
.qc.wrong{background:linear-gradient(135deg,#fee2e2,#fecaca);border-color:#ef4444;}
.qc.wrong .qc-main,.qc.wrong .qc-sub{color:#dc2626;}
.qc.dim{opacity:.27;}
.qc:disabled{cursor:default;}

/* ── RANK CARD ── */
.rank-card{border-radius:20px;padding:22px 16px;text-align:center;margin-bottom:13px;position:relative;overflow:hidden;}
.rank-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 100% 80% at 50% -10%,rgba(255,255,255,.12),transparent);}
.rc-bronze{background:linear-gradient(135deg,#92400e,#b45309);}
.rc-silver{background:linear-gradient(135deg,#374151,#6b7280);}
.rc-gold{background:linear-gradient(135deg,#78350f,#d97706);}
.rc-diamond{background:linear-gradient(135deg,#1e1b4b,#4f46e5);}
.rc-master{background:linear-gradient(135deg,#4a1942,#9333ea);}
.rk-e{font-size:46px;line-height:1;margin-bottom:8px;position:relative;}
.rk-b{display:inline-block;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 12px;border-radius:18px;margin-bottom:7px;position:relative;}
.rk-n{font-size:22px;font-weight:800;color:#fff;font-family:serif;margin-bottom:2px;position:relative;}
.rk-d{font-size:12px;color:rgba(255,255,255,.55);position:relative;}

/* ── OVERLAY ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:999;display:flex;align-items:center;justify-content:center;animation:fadein .12s;}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.popup{border-radius:22px;padding:24px 28px;text-align:center;min-width:180px;animation:popin .18s cubic-bezier(.34,1.56,.64,1);}
@keyframes popin{from{transform:scale(.65);opacity:0}to{transform:scale(1);opacity:1}}
.popup-l{background:var(--card);box-shadow:0 12px 40px rgba(0,0,0,.2);}
.popup-d{background:linear-gradient(135deg,#1a1208,#3a2010);border:1.5px solid var(--gold2);box-shadow:0 12px 40px rgba(0,0,0,.5);}
.pop-i{font-size:40px;line-height:1;margin-bottom:6px;}
.pop-v{font-size:13px;font-weight:700;margin-bottom:8px;}
.pop-v.ok{color:#15803d;}.pop-v.ng{color:#dc2626;}
.pop-k{font-size:32px;font-weight:800;font-family:serif;color:var(--ink);}
.pop-m{font-size:14px;color:var(--gold);margin-top:2px;font-family:serif;}
.cheer-m{font-size:20px;font-weight:800;color:var(--gold3);font-family:serif;margin-bottom:3px;}
.cheer-s{font-size:11px;color:rgba(255,255,255,.5);}
.rv-banner{background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.18);border-radius:10px;padding:8px 13px;margin:6px 14px 0;flex-shrink:0;display:flex;align-items:center;gap:7px;}
.rv-banner.hide{display:none;}
.rv-txt{font-size:11px;color:var(--red);font-weight:600;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="scr">
<div class="hcenter">
  <div class="badge">📚 대한검정회 · 준4급 · 150자</div>
  <div class="htitle">한자 <span>플래시카드</span></div>
  <p class="hsub">부수 · 유래 · 훈음 · 퀴즈를 한 번에!</p>
  <div class="tabs">
    <button class="tab on" onclick="setTab(0)">🌱 초급<br><small style="font-size:10px;opacity:.7">그림카드</small></button>
    <button class="tab"    onclick="setTab(1)">⚡ 중급<br><small style="font-size:10px;opacity:.7">퀴즈</small></button>
    <button class="tab"    onclick="setTab(2)">📝 고급<br><small style="font-size:10px;opacity:.7">빈칸맞추기</small></button>
  </div>
  <div class="panel on" id="panel0"><div class="lv-list" id="lvList"></div></div>
  <div class="panel"    id="panel1"><div class="sec-list" id="secList"></div><button class="bigbtn purple" onclick="startQuiz(-1)">🔥 전체 통합 퀴즈 (150문제)</button></div>
  <div class="panel"    id="panel2">
    <div class="qz-banner"><div class="qzb-ico">📝</div><div class="qzb-title">빈칸 맞추기</div><div class="qzb-desc">단어 속 빈칸 한자를 4지선다로 맞춰요!<br>두 단어 힌트로 문맥까지 함께 학습</div></div>
    <div class="my-rank" id="myRank" style="display:none"><span class="mr-lbl">내 등급</span><span class="mr-rank" id="mrRankTxt"></span><span class="mr-pct" id="mrPctTxt"></span></div>
    <div class="sec-list" id="qzSecList"></div>
    <button class="bigbtn dark" onclick="startFlip(-1)">📝 전체 150자 빈칸 맞추기</button>
  </div>
</div>
</div>

<!-- STUDY1 -->
<div id="study1" class="scr off">
  <div class="tb"><button class="tb-back" onclick="back1()">←</button><div class="tb-info"><div class="tb-title" id="t1title"></div><div class="tb-sub" id="t1sub">그림카드</div></div><div class="tb-cnt" id="t1cnt"></div></div>
  <div class="pbar"><div class="pfill" id="pf1" style="width:0%"></div></div>
  <div class="card-stage">
    <div class="card-outer" onclick="flip1()">
      <div class="card-inner" id="ci1">
        <div class="face face-front">
          <div class="cf-badge" id="cf_badge"></div>
          <div class="cf-rad"   id="cf_rad"></div>
          <div class="cf-k"     id="cf_k"></div>
          <div class="cf-hint"  id="cf_hint"></div>
          <div class="cf-tap">탭하여 훈음 확인 ↺</div>
        </div>
        <div class="face face-back">
          <div class="cb-k"    id="cb_k"></div>
          <div class="cb-read" id="cb_read"></div>
          <div class="cb-mean" id="cb_mean"></div>
          <div class="cb-line"></div>
          <div class="cb-rad-row"><span class="cb-rl">부수</span><span class="cb-rv" id="cb_rad"></span></div>
          <div class="cb-orig"  id="cb_orig"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="ca">
    <button class="cabtn ca-prev" onclick="prev1()">‹</button>
    <button class="cabtn ca-again" onclick="mark1(false)">❌ 다시</button>
    <button class="cabtn ca-know"  onclick="mark1(true)">⭕ 외웠어</button>
  </div>
</div>

<!-- RESULT1 -->
<div id="result1" class="scr off"><div class="result-wrap"><div class="ri">
  <div class="ri-e" id="r1e"></div><div class="ri-t" id="r1t"></div><div class="ri-s">학습 완료!</div>
  <div class="stats">
    <div class="stat cg"><div class="stat-n" id="r1kn"></div><div class="stat-l">✅ 외웠음</div></div>
    <div class="stat cr"><div class="stat-n" id="r1un"></div><div class="stat-l">❌ 모름</div></div>
    <div class="stat cgo"><div class="stat-n" id="r1pt"></div><div class="stat-l">정답률</div></div>
  </div>
  <div class="w-sec" id="ws1"><div class="w-ttl">❌ 다시 볼 한자</div><div class="w-chips" id="wc1"></div></div>
  <div class="r-btns"><button class="rbtn btn-gold" id="r1retry"></button><button class="rbtn btn-outline" onclick="goHome()">🏠 홈으로</button></div>
</div></div></div>

<!-- STUDY2 -->
<div id="study2" class="scr off">
  <div class="tb"><button class="tb-back" onclick="back2()">←</button><div class="tb-info"><div class="tb-title" id="t2title"></div><div class="tb-sub" id="t2sub"></div></div><div class="tb-cnt" id="t2cnt" style="color:#5b21b6"></div></div>
  <div class="pbar"><div class="pfill" id="pf2" style="width:0%"></div></div>
  <div class="rv-banner hide" id="rvBanner"><span>🔁</span><div class="rv-txt" id="rvTxt"></div></div>
  <!-- 문제 영역 -->
  <div style="flex-shrink:0;padding:12px 16px 6px;text-align:center;">
    <div style="font-size:11px;color:var(--gray);margin-bottom:10px;letter-spacing:.5px;" id="s2_qnum"></div>

function getS2Dist(correct){
  const sameP=shuf(H.filter(x=>x.k!==correct.k&&x.p===correct.p));
  const fc=correct.m.charAt(0);
  const sameMF=shuf(H.filter(x=>x.k!==correct.k&&x.p!==correct.p&&x.m.charAt(0)===fc));
  const sameR=shuf(H.filter(x=>x.k!==correct.k&&x.p!==correct.p&&x.m.charAt(0)!==fc&&x.r.charAt(0)===correct.r.charAt(0)));
  const others=shuf(H.filter(x=>x.k!==correct.k&&x.p!==correct.p&&x.m.charAt(0)!==fc&&x.r.charAt(0)!==correct.r.charAt(0)));
  const pool=[...sameP,...sameMF,...sameR,...others];
  const seen=new Set([correct.k]);const res=[];
  for(const x of pool){if(!seen.has(x.k)){seen.add(x.k);res.push(x);}if(res.length===3)break;}
  return res;
}

  const c=cur.deck2[cur.idx2];
  $('pf2').style.width=(cur.idx2/cur.deck2.length*100)+'%';

  const wds=WORDS[c.k]||[{w:c.k+'?',r:'?',pos:0}];
  const w1=wds[0];
  const w2=wds[1]||null;
  const b1=makeBlank(w1.w,w1.r,w1.pos);
  $('s2_blank').textContent=b1.kanji;
  $('s2_reading').textContent=b1.reading;
  if(w2){
    const b2=makeBlank(w2.w,w2.r,w2.pos);
    $('s2_blank2').textContent=b2.kanji;
    $('s2_reading2').textContent=b2.reading;
  } else {
    $('s2_blank2').textContent='';
    $('s2_reading2').textContent='';
  }
  const choices=shuf([c,...getS2Dist(c)]);
  $('s2choices').innerHTML=choices.map(ch=>`
    <button class="qc" data-k="${ch.k}" onclick="s2Pick('${ch.k}')">
      <span class="qc-main" style="font-size:22px;">${ch.k}</span>
    </button>`).join('');
}
function s2Pick(sel){
  const c=cur.deck2[cur.idx2];
  const ok=sel===c.k;
  document.querySelectorAll('#s2choices .qc').forEach(b=>{
    b.disabled=true;
    if(b.dataset.k===c.k)b.classList.add('correct');
    else if(b.dataset.k===sel)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){cur.known2.add(c.k);cur.unk2.delete(c.k);cur.s2score++;sndOk();}
  else{cur.unk2.add(c.k);cur.known2.delete(c.k);sndNg();}
  $('t2cnt').textContent=cur.s2score+'점';
  const wds=WORDS[c.k]||[];
  const wordsHtml=wds.map(w=>`<div style="font-family:serif;font-size:14px;color:var(--gold);letter-spacing:2px;margin-top:3px;">${w.w} <span style="font-size:11px;color:var(--gray)">(${w.r})</span></div>`).join('');
  const d=document.createElement('div');d.className='overlay';
  d.innerHTML=`<div class="popup popup-l">
    <div class="pop-i">${ok?'⭕':'❌'}</div>
    <div class="pop-v ${ok?'ok':'ng'}">${ok?'정 답!':'오 답!'}</div>
    <div class="pop-k">${c.k}</div>
    <div class="pop-m">${c.p} · ${c.m}</div>
    <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(154,123,46,.15);text-align:center;">${wordsHtml}</div>
  </div>`;
  document.body.appendChild(d);
  setTimeout(()=>{d.remove();cur.idx2++;renderQ2();},ok?1400:2200);
}
function back2(){if(confirm('홈으로 돌아갈까요?'))goHome();}
function startReview(){startFlip(cur.si,true);}
function retryFlip(){startFlip(cur.si,false);}
function showResult2(pct){
  const wc=cur.deck2.filter(c=>cur.unk2.has(c.k));
  $('r2e').textContent=pct===100?'🏆':pct>=80?'🎉':pct>=60?'😊':'💪';
  $('r2t').textContent=pct===100?'완벽!':pct>=80?'훌륭해요!':pct>=60?'잘하고 있어요!':'다시 도전!';
  $('r2s').textContent=cur.rev?'복습 완료!':'1회 학습 완료!';
  $('r2kn').textContent=cur.known2.size;
  $('r2un').textContent=cur.unk2.size;
  $('r2pt').textContent=pct+'%';
  if(wc.length){
    $('ws2').style.display='block';
    $('wc2').innerHTML=wc.map(c=>`<div class="w-chip"><div class="wck">${c.k}</div><div class="wc-m">${c.p}·${c.m}</div></div>`).join('');
  } else {
    $('ws2').style.display='none';
  }
  const rb=$('r2rv');
  if(wc.length){rb.disabled=false;rb.textContent='🔁 모름 '+wc.length+'자 다시 학습';}
  else{rb.disabled=true;rb.textContent='✅ 모름 카드 없음!';}
  if(pct===100)setTimeout(sndFan,400);
  show('result2');
}

/* ── 퀴즈 ── */
function getHardDist(c){
  const sameP=shuf(H.filter(x=>x.k!==c.k&&x.p===c.p));
  const fc=c.m.charAt(0);
  const sameMF=shuf(H.filter(x=>x.k!==c.k&&x.p!==c.p&&x.m.charAt(0)===fc));
  const sameR=shuf(H.filter(x=>x.k!==c.k&&x.p!==c.p&&x.m.charAt(0)!==fc&&x.r.charAt(0)===c.r.charAt(0)));
  const others=shuf(H.filter(x=>x.k!==c.k&&x.p!==c.p&&x.m.charAt(0)!==fc&&x.r.charAt(0)!==c.r.charAt(0)));
  const pool=[...sameP,...sameMF,...sameR,...others];
  const seen=new Set([c.k]);const res=[];
  for(const x of pool){if(!seen.has(x.k)){seen.add(x.k);res.push(x);}if(res.length===3)break;}
  return res;
}
function startQuiz(si,wrongOnly=false){
  cur.qsi=si;cur.qwo=wrongOnly;
  const base=wrongOnly?[...cur.qWL]:si===-1?[...H]:[...SEC[si].c];
  cur.qDeck=shuf(base);
  cur.qI=0;cur.qScore=0;cur.qOK=[];cur.qWL=[];cur.qStr=0;cur.qChi=0;
  $('qtitle').textContent=wrongOnly?'📕 오답 복습':(si===-1?'전체 통합':SEC[si].l)+' 퀴즈';
  $('qsub').textContent=cur.qDeck.length+'문제 · 漢字→훈음';
  $('qscore').textContent='0점';
  show('quiz');
  renderQ();
}
function renderQ(){
  if(cur.qI>=cur.qDeck.length){showQResult();return;}
  const c=cur.qDeck[cur.qI];
  $('qpf').style.width=(cur.qI/cur.qDeck.length*100)+'%';
  $('qqnum').textContent=(cur.qI+1)+' / '+cur.qDeck.length;
  const pos=cur.qStr%5;
  for(let i=0;i<5;i++)$('sd'+i).classList.toggle('lit',i<pos);
  $('qqk').textContent=c.k;
  const choices=shuf([c,...getHardDist(c)]);
  $('qchoices').innerHTML=choices.map(ch=>`
    <button class="qc" data-k="${ch.k}" onclick="qPick('${ch.k}')">
      <span class="qc-main">${ch.m}</span>
      <span class="qc-sub">${ch.p}</span>
    </button>`).join('');
}
function qPick(sel){
  const c=cur.qDeck[cur.qI];
  const ok=sel===c.k;
  document.querySelectorAll('.qc').forEach(b=>{
    b.disabled=true;
    if(b.dataset.k===c.k)b.classList.add('correct');
    else if(b.dataset.k===sel)b.classList.add('wrong');
    else b.classList.add('dim');
  });
  if(ok){cur.qScore++;cur.qOK.push(c);cur.qStr++;sndOk();
    if(cur.qStr>0&&cur.qStr%5===0){
      for(let i=0;i<5;i++)$('sd'+i).classList.add('lit');
      const ch=CHEERS[cur.qChi%CHEERS.length];cur.qChi++;
      showCheer(ch,()=>{for(let i=0;i<5;i++)$('sd'+i).classList.remove('lit');cur.qI++;$('qscore').textContent=cur.qScore+'점';renderQ();});
      return;
    }
  } else {cur.qWL.push(c);cur.qStr=0;sndNg();}
  $('qscore').textContent=cur.qScore+'점';
  showAnsPop(ok,c);
}
function showAnsPop(ok,card){
  const d=document.createElement('div');d.className='overlay';
  d.innerHTML=`<div class="popup popup-l"><div class="pop-i">${ok?'⭕':'❌'}</div><div class="pop-v ${ok?'ok':'ng'}">${ok?'정 답!':'오 답!'}</div><div class="pop-k">${card.k}</div><div class="pop-m">${card.p} · ${card.m}</div></div>`;
  document.body.appendChild(d);
  setTimeout(()=>{d.remove();cur.qI++;renderQ();},ok?700:1200);
}
function showCheer(ch,cb){
  const d=document.createElement('div');d.className='overlay';
  d.innerHTML=`<div class="popup popup-d"><div class="pop-i">${ch.e}</div><div class="cheer-m">${ch.m}</div><div class="cheer-s">${ch.s}</div></div>`;
  document.body.appendChild(d);sndFan();
  setTimeout(()=>{d.remove();cb();},1500);
}
function showQResult(){
  const tot=cur.qDeck.length,ok=cur.qOK.length,pct=Math.round(ok/tot*100);
  if(cur.qsi>=0&&(bests.qz[cur.qsi]==null||pct>bests.qz[cur.qsi]))bests.qz[cur.qsi]=pct;
  renderSec();
  const rk=getRank(pct);
  $('rankCard').className='rank-card rc-'+rk.id;
  $('rke').textContent=rk.e;$('rkb').textContent=rk.b;$('rkn').textContent=rk.n;$('rkd').textContent=rk.d;
  $('qrc').textContent=ok;$('qrw').textContent=cur.qWL.length;$('qrp').textContent=pct+'%';
  if(cur.qWL.length){
    $('qrws').style.display='block';
    $('qrwc').innerHTML=cur.qWL.map(c=>`<div class="w-chip"><div class="wck">${c.k}</div><div class="wc-m">${c.p}·${c.m}</div></div>`).join('');
  } else $('qrws').style.display='none';
  const rw=$('qrRetryW');
  if(cur.qWL.length){rw.disabled=false;rw.textContent='📕 오답 '+cur.qWL.length+'문제 다시 풀기';}
  else{rw.disabled=true;rw.textContent='✅ 오답 없음!';}
  const lb=cur.qsi===-1?'전체':SEC[cur.qsi].l;
  $('qrRetry').textContent='🔄 '+lb+' 다시 풀기';
  if(pct>=85)setTimeout(sndFan,500);
  show('qresult');
}
function retryWrong(){startQuiz(cur.qsi,true);}
function retryQuiz(){startQuiz(cur.qsi,false);}
function backQuiz(){if(confirm('퀴즈를 종료할까요?'))goHome();}

/* 초기화 */
renderLv();
</script>
